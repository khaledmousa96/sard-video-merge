name: Build Medical Cartoon Long Compilation

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: "YouTube Shorts channel URL"
        required: false
        default: "https://www.youtube.com/@truelegends-f1j/shorts"
        type: string
      max_clips:
        description: "Target number of Shorts to include"
        required: false
        default: "30"
        type: string
      min_clips:
        description: "Minimum Shorts required to build a long video"
        required: false
        default: "12"
        type: string
      pool_size:
        description: "How many recent channel Shorts to scan"
        required: false
        default: "120"
        type: string
      output_name:
        description: "Output MP4 file name"
        required: false
        default: "medical_cartoon_compilation.mp4"
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: medical-cartoon-long-compilation
  cancel-in-progress: false

jobs:
  build-medical-compilation:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install FFmpeg and Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install yt-dlp

      - name: Build 16:9 medical cartoon compilation from channel Shorts
        env:
          CHANNEL_URL: ${{ github.event.inputs.channel_url }}
          MAX_CLIPS: ${{ github.event.inputs.max_clips }}
          MIN_CLIPS: ${{ github.event.inputs.min_clips }}
          POOL_SIZE: ${{ github.event.inputs.pool_size }}
          OUTPUT_NAME: ${{ github.event.inputs.output_name }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          from yt_dlp import YoutubeDL

          channel_url = os.environ.get("CHANNEL_URL", "https://www.youtube.com/@truelegends-f1j/shorts").strip()
          max_clips = int(os.environ.get("MAX_CLIPS", "30") or "30")
          min_clips = int(os.environ.get("MIN_CLIPS", "12") or "12")
          pool_size = int(os.environ.get("POOL_SIZE", "120") or "120")
          output_name = os.environ.get("OUTPUT_NAME", "medical_cartoon_compilation.mp4").strip() or "medical_cartoon_compilation.mp4"
          if not output_name.lower().endswith(".mp4"):
              output_name += ".mp4"

          for folder in ["input", "normalized", "output", "metadata", "data"]:
              Path(folder).mkdir(parents=True, exist_ok=True)

          history_path = Path("data") / "medical_cartoon_compiled_history.json"
          if history_path.exists():
              try:
                  history = json.loads(history_path.read_text(encoding="utf-8"))
              except Exception:
                  history = {}
          else:
              history = {}
          history.setdefault("counts", {})
          history.setdefault("compilations", [])

          medical_keywords = [
              "medical", "dental", "dentist", "tooth", "teeth", "braces", "care", "doctor",
              "cartoon", "asmr", "cleaning", "skin", "face", "nail", "eye", "ear", "germ"
          ]
          blocked_keywords = ["pet", "puppy", "cat", "dog", "animal", "fur", "garage", "sofa", "patio", "balcony", "pressure"]

          def run(cmd):
              print("Running:", " ".join(str(x) for x in cmd))
              subprocess.run(cmd, check=True)

          def ffprobe_has_audio(path):
              result = subprocess.run(
                  ["ffprobe", "-v", "error", "-select_streams", "a", "-show_entries", "stream=index", "-of", "csv=p=0", str(path)],
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )
              return bool(result.stdout.strip())

          def ffprobe_duration(path):
              result = subprocess.run(
                  ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", str(path)],
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )
              try:
                  return max(float(result.stdout.strip()), 0.1)
              except Exception:
                  return 10.0

          def ffprobe_size(path):
              result = subprocess.run(
                  ["ffprobe", "-v", "error", "-select_streams", "v:0", "-show_entries", "stream=width,height", "-of", "csv=s=x:p=0", str(path)],
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )
              return result.stdout.strip()

          def clean_title(title):
              title = re.sub(r"#\w+", "", title or "").strip()
              title = re.sub(r"\s+", " ", title)
              return title[:90] or "Cartoon Medical Care ASMR"

          def format_time(seconds):
              seconds = int(round(seconds))
              return f"{seconds // 60:02d}:{seconds % 60:02d}"

          print(f"Scanning channel shorts: {channel_url}")
          flat_opts = {"quiet": True, "extract_flat": "in_playlist", "playlistend": pool_size, "skip_download": True}
          with YoutubeDL(flat_opts) as ydl:
              info = ydl.extract_info(channel_url, download=False)
          raw_entries = [e for e in (info.get("entries") or []) if e]
          print(f"Raw entries found: {len(raw_entries)}")

          candidates = []
          seen = set()
          meta_opts = {"quiet": True, "skip_download": True, "noplaylist": True}
          with YoutubeDL(meta_opts) as ydl:
              for entry in raw_entries:
                  vid = entry.get("id") or entry.get("url")
                  if not vid or vid in seen:
                      continue
                  seen.add(vid)
                  video_url = f"https://www.youtube.com/watch?v={vid}" if not str(vid).startswith("http") else str(vid)
                  try:
                      meta = ydl.extract_info(video_url, download=False)
                  except Exception as exc:
                      print(f"Skipping metadata failure for {video_url}: {exc}")
                      continue

                  title = clean_title(meta.get("title") or entry.get("title") or "Cartoon Medical Care ASMR")
                  title_l = title.lower()
                  duration = float(meta.get("duration") or 0)
                  if duration and duration > 75:
                      print(f"Skipping not-short video: {title} ({duration}s)")
                      continue
                  if any(k in title_l for k in blocked_keywords) and not any(k in title_l for k in ["dental", "medical", "doctor", "tooth", "teeth"]):
                      print(f"Skipping off-niche title: {title}")
                      continue
                  # Prefer matching medical/cartoon keywords, but don't block early channels with generic Shorts titles.
                  keyword_score = sum(1 for k in medical_keywords if k in title_l)
                  candidates.append({
                      "id": meta.get("id") or vid,
                      "url": f"https://www.youtube.com/watch?v={meta.get('id') or vid}",
                      "short_url": f"https://www.youtube.com/shorts/{meta.get('id') or vid}",
                      "title": title,
                      "duration": duration or 10.0,
                      "upload_date": meta.get("upload_date") or "",
                      "view_count": int(meta.get("view_count") or 0),
                      "keyword_score": keyword_score,
                  })

          if len(candidates) < min_clips:
              raise ValueError(f"Only {len(candidates)} usable Shorts found. Need at least {min_clips}. Keep publishing medical cartoon Shorts first, then retry.")

          last_ids = set(history.get("compilations", [])[-1].get("ids", [])) if history.get("compilations") else set()
          counts = history.get("counts", {})
          selectable = [c for c in candidates if c["id"] not in last_ids]
          if len(selectable) < min_clips:
              selectable = candidates[:]

          selectable.sort(key=lambda c: (int(counts.get(c["id"], 0)), -c.get("keyword_score", 0), -c.get("view_count", 0)))
          selected = selectable[:max_clips]
          if len(selected) < min_clips:
              raise ValueError(f"Only {len(selected)} selected Shorts. Need at least {min_clips}.")

          print("Selected Shorts:")
          for i, clip in enumerate(selected, 1):
              print(f"{i:02d}. {clip['id']} | {clip['title']} | {clip['short_url']}")

          video_filter = (
              "[0:v]scale=1920:1080:force_original_aspect_ratio=increase,crop=1920:1080,boxblur=28:1[bg];"
              "[0:v]scale=608:1080:force_original_aspect_ratio=decrease[fg];"
              "[bg][fg]overlay=(W-w)/2:(H-h)/2,setsar=1,format=yuv420p[v]"
          )

          normalized_files = []
          chapter_starts = []
          elapsed = 0.0
          download_opts_base = {
              "format": "bv*[height<=1280]+ba/b[height<=1280]/best",
              "merge_output_format": "mp4",
              "noplaylist": True,
              "quiet": False,
              "retries": 5,
              "fragment_retries": 5,
          }

          for index, clip in enumerate(selected, start=1):
              outtmpl = str(Path("input") / f"clip_{index:02d}") + ".%(ext)s"
              download_opts = dict(download_opts_base)
              download_opts["outtmpl"] = outtmpl
              print(f"Downloading clip {index}: {clip['short_url']}")
              with YoutubeDL(download_opts) as ydl:
                  ydl.download([clip["short_url"]])

              downloaded_files = sorted(Path("input").glob(f"clip_{index:02d}.*"), key=lambda p: p.stat().st_size, reverse=True)
              if not downloaded_files:
                  raise ValueError(f"Download failed for {clip['short_url']}")
              input_path = downloaded_files[0]
              if input_path.stat().st_size < 1000:
                  raise ValueError(f"Downloaded file is invalid: {input_path}")

              output_path = Path("normalized") / f"clip_{index:02d}.mp4"
              has_audio = ffprobe_has_audio(input_path)
              duration = ffprobe_duration(input_path)
              chapter_starts.append((elapsed, clip["title"]))
              elapsed += duration

              if has_audio:
                  cmd = ["ffmpeg", "-y", "-i", str(input_path), "-filter_complex", video_filter, "-map", "[v]", "-map", "0:a:0", "-r", "30", "-c:v", "libx264", "-preset", "veryfast", "-crf", "22", "-pix_fmt", "yuv420p", "-c:a", "aac", "-ar", "44100", "-ac", "2", "-shortest", str(output_path)]
              else:
                  cmd = ["ffmpeg", "-y", "-i", str(input_path), "-f", "lavfi", "-t", str(duration), "-i", "anullsrc=channel_layout=stereo:sample_rate=44100", "-filter_complex", video_filter, "-map", "[v]", "-map", "1:a:0", "-r", "30", "-c:v", "libx264", "-preset", "veryfast", "-crf", "22", "-pix_fmt", "yuv420p", "-c:a", "aac", "-ar", "44100", "-ac", "2", "-shortest", str(output_path)]
              run(cmd)
              print(f"Normalized clip size: {ffprobe_size(output_path)}")
              normalized_files.append(output_path)

          list_path = Path("list.txt")
          with list_path.open("w", encoding="utf-8") as f:
              for file_path in normalized_files:
                  f.write(f"file '{file_path.resolve()}'\n")

          final_path = Path("output") / output_name
          run(["ffmpeg", "-y", "-f", "concat", "-safe", "0", "-i", str(list_path), "-vf", "scale=1920:1080,setsar=1,format=yuv420p", "-r", "30", "-c:v", "libx264", "-preset", "veryfast", "-crf", "22", "-pix_fmt", "yuv420p", "-c:a", "aac", "-ar", "44100", "-ac", "2", "-movflags", "+faststart", str(final_path)])

          if not final_path.exists() or final_path.stat().st_size < 1000:
              raise ValueError("Compilation video was not created")
          final_size = ffprobe_size(final_path)
          print(f"Final video size: {final_size}")
          if final_size != "1920x1080":
              raise ValueError(f"Final video must be 1920x1080. Current size: {final_size}")

          chapters = [f"{format_time(start)} {clip_title}" for start, clip_title in chapter_starts]
          clip_count = len(selected)
          approx_minutes = max(1, round(elapsed / 60))
          title = f"Cute Cartoon Medical Care ASMR Compilation | {clip_count} Satisfying Shorts"
          description = (
              "Watch a relaxing compilation of cute cartoon medical-care ASMR Shorts, including dental cleaning, braces care, skin care, nail care, and gentle cartoon clinic transformations.\n\n"
              "This is fictional cartoon content for entertainment only. It is not medical advice.\n\n"
              "Chapters:\n" + "\n".join(chapters) + "\n\n"
              "Subscribe to True Legends for more cute cartoon medical-care ASMR and satisfying transformation videos.\n\n"
              "#asmr\n#cartoon\n#medicalanimation\n#dentalcare\n#satisfying"
          )
          metadata = {
              "title": title,
              "description": description,
              "tags": ["cartoon medical asmr", "medical animation", "dental care animation", "cartoon care", "satisfying animation", "asmr", "cartoon transformation", "cute doctor animation", "braces cleaning", "skincare animation", "youtube shorts compilation"],
              "category_id": "24",
              "privacy_status": "public",
              "made_for_kids": False,
              "selected_shorts": selected,
              "created_at": datetime.now(timezone.utc).isoformat(),
              "output_name": output_name,
              "approx_minutes": approx_minutes,
          }
          Path("metadata/compilation_metadata.json").write_text(json.dumps(metadata, ensure_ascii=False, indent=2), encoding="utf-8")

          record = {"created_at": datetime.now(timezone.utc).isoformat(), "ids": [c["id"] for c in selected], "titles": [c["title"] for c in selected], "output_name": output_name}
          history["compilations"].append(record)
          history["compilations"] = history["compilations"][-100:]
          for c in selected:
              history["counts"][c["id"]] = int(history["counts"].get(c["id"], 0)) + 1
          history_path.write_text(json.dumps(history, ensure_ascii=False, indent=2), encoding="utf-8")

          print("SUCCESS: medical cartoon long compilation created")
          print(f"Output: {final_path}")
          print(f"Metadata: metadata/compilation_metadata.json")
          PY

      - name: Commit compilation history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/medical_cartoon_compiled_history.json
          git commit -m "Update medical cartoon compilation history" || echo "No history changes to commit"
          git push || echo "History push skipped"

      - name: Upload final compilation artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-medical-cartoon-long-compilation
          path: |
            output/*.mp4
            metadata/compilation_metadata.json
          if-no-files-found: error
